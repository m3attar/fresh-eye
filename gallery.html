.title{

    color:#00f7ff;

.grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);

}

@media (max-width: 600px){

}
.card{
    background:#12131c;
    padding:10px;
    border-radius:15px;
}

.card img{
    width:100%;
    border-radius:10px;
}
